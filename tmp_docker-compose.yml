# =============================================================================
# Captacao Peticao Blindada - Docker Compose (Hardened)
# =============================================================================

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: captacao-backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:${CAPTACAO_PORT:-8000}:8000"
    volumes:
      - captacao-data:/app/data
    env_file:
      - .env
    environment:
      - CAPTACAO_DB_PATH=/app/data/captacao_blindada.db
      - PYTHONPATH=/app
      - IS_PRODUCTION=${IS_PRODUCTION:-false}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-default-dev-key-change-in-production}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/metrics/health"]
      interval: 60s
      timeout: 15s
      start_period: 120s
      retries: 5
    security_opt:
      - no-new-privileges:true
    networks:
      - captacao-net

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: captacao-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-3000}:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://backend:8000}
    depends_on:
      - backend
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
      - /app/.next/cache
    networks:
      - captacao-net

volumes:
  captacao-data:
    driver: local

networks:
  captacao-net:
    driver: bridge
